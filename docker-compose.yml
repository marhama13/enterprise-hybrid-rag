
services:

  backend:
    build:
      context: ./backend

    container_name: hybrid-rag-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/processed:/app/processed
      - ./backend/chroma_db:/app/chroma_db

    env_file:
      - ./backend/.env

    restart: unless-stopped


  frontend:
    build:
      context: ./frontend

    container_name: hybrid-rag-frontend

    ports:
      - "3000:80"

    depends_on:
      - backend

    restart: unless-stopped